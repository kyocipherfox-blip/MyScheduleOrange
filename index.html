<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>週間スケジュール表</title>
  <link rel="stylesheet" href="css/style.css">
  <style id="dynamic-cat-css"></style>
</head>
<body>

<h1>週間スケジュール表</h1>

<div class="nav-bar">
  <div class="week-nav">
    <button class="nav-btn" id="prevWeekBtn">◀ 前週</button>
    <span id="weekLabel"></span>
    <button class="nav-btn" id="nextWeekBtn">次週 ▶</button>
  </div>
  <div class="nav-right">
    <div class="view-toggle">
      <button class="view-btn" data-weeks="1">1週間</button>
      <button class="view-btn" data-weeks="2">2週間</button>
    </div>
    <button class="cat-btn" id="catSettingsBtn">⚙ カテゴリ</button>
  </div>
</div>

<div class="interval-control">
  <span class="interval-label">時間間隔</span>
  <div class="slider-wrap">
    <input type="range" id="intervalSlider" min="0" max="3" step="1" value="1">
    <div class="slider-ticks">
      <span data-idx="0">15分</span>
      <span data-idx="1">30分</span>
      <span data-idx="2">1時間</span>
      <span data-idx="3">2時間</span>
    </div>
  </div>
  <span class="interval-badge" id="intervalBadge">30分</span>
  <span class="interval-label" style="margin-left:16px">表示サイズ</span>
  <div class="zoom-control">
    <button class="zoom-btn" id="zoomOutBtn">－</button>
    <span id="zoomLabel">100%</span>
    <button class="zoom-btn" id="zoomInBtn">＋</button>
  </div>
</div>

<div class="table-wrapper">
  <div class="schedule-inner" id="scheduleInner">
    <div class="schedule-header" id="scheduleHeader"></div>
    <div class="schedule-body">
      <div class="time-axis" id="timeAxis"></div>
      <div class="days-wrapper" id="daysWrapper"></div>
    </div>
  </div>
</div>

<div class="legend" id="legend"></div>

<!-- Event modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">予定を追加</h2>
    <label>予定名</label>
    <input type="text" id="eventName" placeholder="例：会議、ランチ…" maxlength="24">
    <label>カテゴリ</label>
    <select id="eventCategory"></select>
    <div class="time-row" style="margin-top:12px">
      <div><label>開始時間</label><input type="time" id="eventStart" step="900"></div>
      <div><label>終了時間</label><input type="time" id="eventEnd"   step="900"></div>
    </div>

    <!-- 繰り返しセクション（新規追加時のみ表示） -->
    <div id="recurSection">
      <label>繰り返し</label>
      <select id="eventRecur">
        <option value="none">繰り返しなし</option>
        <option value="daily">毎日</option>
        <option value="weekday">平日のみ（月〜金）</option>
        <option value="weekly">毎週（曜日を選択）</option>
        <option value="biweekly">隔週（曜日を選択）</option>
        <option value="monthly">毎月</option>
      </select>
      <div id="recurWeekdaysRow" style="display:none">
        <label style="margin-top:8px">曜日を選択</label>
        <div class="recur-weekdays">
          <label><input type="checkbox" name="recurDay" value="1"> 月</label>
          <label><input type="checkbox" name="recurDay" value="2"> 火</label>
          <label><input type="checkbox" name="recurDay" value="3"> 水</label>
          <label><input type="checkbox" name="recurDay" value="4"> 木</label>
          <label><input type="checkbox" name="recurDay" value="5"> 金</label>
          <label><input type="checkbox" name="recurDay" value="6"> 土</label>
          <label><input type="checkbox" name="recurDay" value="0"> 日</label>
        </div>
      </div>
      <div id="recurEndRow" style="display:none">
        <label>繰り返し終了日</label>
        <input type="date" id="recurEndDate">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-cancel" id="modalCancel">キャンセル</button>
      <button class="btn btn-primary" id="modalSaveBtn">追加</button>
    </div>
  </div>
</div>

<!-- Category modal -->
<div class="modal-overlay" id="catModalOverlay">
  <div class="modal modal-wide">
    <h2>カテゴリ管理</h2>
    <div class="cat-list" id="catList"></div>
    <button class="btn-add-cat" id="addCatBtn">＋ カテゴリを追加</button>
    <div class="modal-actions">
      <button class="btn btn-cancel" id="catModalCancel">閉じる</button>
      <button class="btn btn-primary" id="catModalSave">保存</button>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
