<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>週間スケジュール表</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background: #f0f2f5; color: #333; padding: 20px;
    }
    body.dragging { user-select: none; cursor: ns-resize; }

    h1 { text-align: center; font-size: 1.5rem; margin-bottom: 12px; color: #2c3e50; }
    .week-label { text-align: center; font-size: 0.9rem; color: #666; margin-bottom: 14px; }

    /* ── Slider ── */
    .interval-control {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; margin-bottom: 20px; user-select: none;
    }
    .interval-label { font-size: 0.85rem; color: #555; }
    .slider-wrap { display: flex; flex-direction: column; width: 260px; }
    #intervalSlider {
      width: 100%; -webkit-appearance: none; appearance: none;
      height: 6px; border-radius: 3px; outline: none; cursor: grab;
      background: linear-gradient(to right, #4a90e2 var(--fill,50%), #ddd var(--fill,50%));
    }
    #intervalSlider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
      background: #fff; border: 3px solid #4a90e2;
      box-shadow: 0 2px 6px rgba(74,144,226,.4); cursor: grab;
    }
    #intervalSlider::-moz-range-thumb {
      width: 22px; height: 22px; border-radius: 50%;
      background: #fff; border: 3px solid #4a90e2; cursor: grab;
    }
    .slider-ticks { display: flex; justify-content: space-between; padding: 4px 2px 0; }
    .slider-ticks span { font-size: 0.72rem; color: #aaa; cursor: pointer; }
    .slider-ticks span.active { color: #4a90e2; font-weight: bold; }
    .interval-badge {
      font-size: 0.82rem; font-weight: bold; color: #fff;
      background: #4a90e2; padding: 4px 14px; border-radius: 12px; white-space: nowrap;
    }

    /* ── Schedule layout ── */
    .table-wrapper {
      overflow-x: auto; border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,.1); background: #fff;
    }
    .schedule-inner { min-width: 720px; }

    .schedule-header {
      display: grid; grid-template-columns: 70px repeat(7,1fr);
      position: sticky; top: 0; z-index: 20;
      border-bottom: 2px solid #ddd; background: #fff;
    }
    .col-header { padding: 10px 6px; text-align: center; font-size: 0.82rem; font-weight: bold; }
    .col-header.time-col { background: #f8f9fa; color: #888; }
    .col-header.mon,.col-header.tue,.col-header.wed,
    .col-header.thu,.col-header.fri { background: #eaf0fb; color: #2255a4; }
    .col-header.sat { background: #e8f4fd; color: #1a78c2; }
    .col-header.sun { background: #fdecea; color: #c0392b; }
    .day-name { display: block; font-size: 0.95rem; }
    .day-date { display: block; font-size: 0.72rem; font-weight: normal; opacity: .8; }

    .schedule-body { display: flex; }

    /* Time axis */
    .time-axis {
      position: relative; width: 70px; flex-shrink: 0;
      background: #f8f9fa; border-right: 2px solid #ddd;
    }
    .time-label {
      position: absolute; right: 6px; font-size: 0.68rem; color: #bbb;
      transform: translateY(-50%); white-space: nowrap; pointer-events: none;
    }
    .time-label.hour { color: #888; font-weight: bold; font-size: 0.75rem; }

    /* Day columns */
    .days-wrapper { display: flex; flex: 1; }
    .day-col {
      flex: 1; position: relative; border-right: 1px solid #e0e0e0;
      cursor: crosshair; min-width: 80px;
    }
    .day-col:last-child { border-right: none; }

    /* Events */
    .event-block {
      position: absolute; left: 2px; right: 2px; border-radius: 5px;
      overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 1px 4px rgba(0,0,0,.12); z-index: 2; min-height: 16px;
      transition: box-shadow .15s;
    }
    .event-block:hover { box-shadow: 0 2px 10px rgba(0,0,0,.22); z-index: 3; }
    .event-block.work     { background: #dbeafe; color: #1e40af; border: 1.5px solid #93c5fd; }
    .event-block.meal     { background: #ffedd5; color: #9a3412; border: 1.5px solid #fdba74; }
    .event-block.exercise { background: #dcfce7; color: #166534; border: 1.5px solid #86efac; }
    .event-block.leisure  { background: #ede9fe; color: #5b21b6; border: 1.5px solid #c4b5fd; }

    .event-content {
      flex: 1; padding: 3px 18px 3px 5px; overflow: hidden;
      display: flex; flex-direction: column; justify-content: center;
    }
    .event-name {
      font-size: 0.72rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .event-time-label { font-size: 0.62rem; opacity: .75; white-space: nowrap; }

    .event-del {
      position: absolute; top: 2px; right: 2px; width: 14px; height: 14px;
      border-radius: 50%; background: rgba(0,0,0,.2); color: #fff;
      border: none; font-size: 9px; line-height: 14px; text-align: center;
      cursor: pointer; padding: 0; display: none; z-index: 4;
    }
    .event-block:hover .event-del { display: block; }

    .resize-handle {
      position: absolute; bottom: 0; left: 0; right: 0; height: 8px;
      cursor: ns-resize; z-index: 4; background: rgba(0,0,0,.07);
      border-radius: 0 0 4px 4px;
    }
    .resize-handle::after {
      content: ''; display: block; width: 20px; height: 2px; margin: 3px auto;
      background: rgba(0,0,0,.25); border-radius: 1px;
    }
    .resize-handle:hover { background: rgba(0,0,0,.18); }

    /* Legend */
    .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 18px; justify-content: center; }
    .legend-badge { display: inline-block; padding: 3px 12px; border-radius: 5px; font-size: 0.75rem; font-weight: 600; }
    .legend-badge.work     { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
    .legend-badge.meal     { background: #ffedd5; color: #9a3412; border: 1px solid #fdba74; }
    .legend-badge.exercise { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .legend-badge.leisure  { background: #ede9fe; color: #5b21b6; border: 1px solid #c4b5fd; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff; border-radius: 12px; padding: 26px 30px;
      width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .modal h2 { font-size: 1rem; color: #2c3e50; margin-bottom: 16px; }
    .modal label { display: block; font-size: 0.78rem; color: #555; margin: 12px 0 3px; }
    .modal input[type="text"], .modal input[type="time"], .modal select {
      width: 100%; padding: 8px 10px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 0.88rem; background: #fff; outline: none;
    }
    .modal input:focus { border-color: #4a90e2; }
    .time-row { display: flex; gap: 10px; }
    .time-row > div { flex: 1; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .btn { padding: 8px 20px; border-radius: 6px; border: none; font-size: 0.85rem; cursor: pointer; font-weight: 600; }
    .btn-primary { background: #4a90e2; color: #fff; }
    .btn-primary:hover { background: #357abd; }
    .btn-cancel { background: #eee; color: #555; }
    .btn-cancel:hover { background: #ddd; }
  </style>
</head>
<body>

<h1>週間スケジュール表</h1>
<div class="week-label">2026年3月16日（月）〜 3月22日（日）</div>

<div class="interval-control">
  <span class="interval-label">時間間隔</span>
  <div class="slider-wrap">
    <input type="range" id="intervalSlider" min="0" max="3" step="1" value="2">
    <div class="slider-ticks">
      <span data-idx="0">15分</span>
      <span data-idx="1">30分</span>
      <span data-idx="2">1時間</span>
      <span data-idx="3">2時間</span>
    </div>
  </div>
  <span class="interval-badge" id="intervalBadge">1時間</span>
</div>

<div class="table-wrapper">
  <div class="schedule-inner">
    <div class="schedule-header">
      <div class="col-header time-col">時間</div>
      <div class="col-header mon"><span class="day-name">月</span><span class="day-date">3/16</span></div>
      <div class="col-header tue"><span class="day-name">火</span><span class="day-date">3/17</span></div>
      <div class="col-header wed"><span class="day-name">水</span><span class="day-date">3/18</span></div>
      <div class="col-header thu"><span class="day-name">木</span><span class="day-date">3/19</span></div>
      <div class="col-header fri"><span class="day-name">金</span><span class="day-date">3/20</span></div>
      <div class="col-header sat"><span class="day-name">土</span><span class="day-date">3/21</span></div>
      <div class="col-header sun"><span class="day-name">日</span><span class="day-date">3/22</span></div>
    </div>
    <div class="schedule-body">
      <div class="time-axis" id="timeAxis"></div>
      <div class="days-wrapper" id="daysWrapper"></div>
    </div>
  </div>
</div>

<div class="legend">
  <span class="legend-badge work">仕事・通勤</span>
  <span class="legend-badge meal">食事</span>
  <span class="legend-badge exercise">運動</span>
  <span class="legend-badge leisure">レジャー・趣味</span>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">予定を追加</h2>
    <label>予定名</label>
    <input type="text" id="eventName" placeholder="例：会議、ランチ…" maxlength="24">
    <label>カテゴリ</label>
    <select id="eventCategory">
      <option value="work">仕事・通勤</option>
      <option value="meal">食事</option>
      <option value="exercise">運動</option>
      <option value="leisure">レジャー・趣味</option>
    </select>
    <div class="time-row" style="margin-top:12px">
      <div>
        <label>開始時間</label>
        <input type="time" id="eventStart" step="900">
      </div>
      <div>
        <label>終了時間</label>
        <input type="time" id="eventEnd" step="900">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" id="modalCancel">キャンセル</button>
      <button class="btn btn-primary" id="modalAdd">追加</button>
    </div>
  </div>
</div>

<script>
  /* ── Constants ── */
  const PX_PER_MIN = 1.2;
  const START_MIN  = 6 * 60;
  const END_MIN    = 22 * 60;
  const TOTAL_H    = (END_MIN - START_MIN) * PX_PER_MIN;
  const INTERVALS  = [15, 30, 60, 120];
  const INT_LABELS = ['15分', '30分', '1時間', '2時間'];
  const DAY_NAMES  = ['月','火','水','木','金','土','日'];
  const STORE_KEY  = 'schedule_v4';
  const SEED_KEY   = 'schedule_seeded_v4';

  let events = [], nextId = 1, intervalIdx = 2;

  /* ── Storage ── */
  function loadData() {
    try {
      const d = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
      events      = d.events      || [];
      nextId      = d.nextId      || 1;
      intervalIdx = d.intervalIdx ?? 2;
    } catch { events = []; nextId = 1; intervalIdx = 2; }
  }

  function saveData() {
    localStorage.setItem(STORE_KEY, JSON.stringify({ events, nextId, intervalIdx }));
  }

  /* ── Sample data ── */
  function seedSample() {
    if (localStorage.getItem(SEED_KEY)) return;
    const add = (col, sh, sm, eh, em, name, cat) =>
      events.push({ id: nextId++, col, startMin: sh*60+sm, endMin: eh*60+em, name, category: cat });

    // 月
    add(0, 7,0, 8,0,'朝食','meal');        add(0, 8,0, 9,0,'通勤','work');
    add(0, 9,0,10,0,'朝礼・メール','work'); add(0,10,0,12,0,'開発作業','work');
    add(0,12,0,13,0,'ランチ','meal');       add(0,13,0,14,0,'定例MTG','work');
    add(0,14,0,18,0,'開発作業','work');     add(0,18,0,19,0,'退勤','work');
    add(0,19,0,20,0,'夕食','meal');         add(0,20,0,21,0,'ジム','exercise');
    // 火
    add(1, 7,0, 8,0,'朝食','meal');        add(1, 8,0, 9,0,'通勤','work');
    add(1, 9,0,12,0,'開発作業','work');     add(1,12,0,13,0,'ランチ','meal');
    add(1,13,0,15,0,'設計レビュー','work'); add(1,15,0,18,0,'テスト','work');
    add(1,18,0,19,0,'退勤','work');         add(1,19,0,20,0,'夕食','meal');
    add(1,21,0,22,0,'読書','leisure');
    // 水
    add(2, 7,0, 8,0,'朝食','meal');        add(2, 8,0, 9,0,'通勤','work');
    add(2, 9,0,10,0,'会議','work');         add(2,10,0,12,0,'開発作業','work');
    add(2,12,0,13,0,'ランチ','meal');       add(2,13,0,15,0,'開発作業','work');
    add(2,15,0,18,0,'テスト','work');       add(2,18,0,19,0,'退勤','work');
    add(2,19,0,20,0,'夕食','meal');         add(2,20,0,21,0,'ジム','exercise');
    // 木
    add(3, 7,0, 8,0,'朝食','meal');        add(3, 8,0, 9,0,'通勤','work');
    add(3, 9,0,12,0,'開発作業','work');     add(3,12,0,13,0,'ランチ','meal');
    add(3,13,0,14,0,'1on1','work');         add(3,14,0,18,0,'開発作業','work');
    add(3,18,0,19,0,'退勤','work');         add(3,19,0,20,0,'夕食','meal');
    add(3,21,0,22,0,'読書','leisure');
    // 金
    add(4, 7,0, 8,0,'朝食','meal');        add(4, 8,0, 9,0,'通勤','work');
    add(4, 9,0,10,0,'週次報告','work');     add(4,10,0,12,0,'開発作業','work');
    add(4,12,0,13,0,'ランチ','meal');       add(4,13,0,15,0,'開発作業','work');
    add(4,15,0,17,0,'リリース作業','work'); add(4,17,0,18,0,'まとめ・日報','work');
    add(4,18,0,19,0,'退勤','work');         add(4,19,0,20,0,'外食','meal');
    add(4,21,0,22,0,'読書','leisure');
    // 土
    add(5, 7,0, 8,0,'朝食','meal');        add(5, 9,0,11,0,'買い物','leisure');
    add(5,12,0,13,0,'ランチ','meal');       add(5,13,0,15,0,'映画','leisure');
    add(5,18,0,19,0,'夕食','meal');         add(5,20,0,22,0,'読書','leisure');
    // 日
    add(6,10,0,11,0,'朝食','meal');         add(6,12,0,13,0,'ランチ','meal');
    add(6,13,0,15,0,'散歩','exercise');     add(6,18,0,19,0,'夕食','meal');
    add(6,20,0,22,0,'読書','leisure');

    saveData();
    localStorage.setItem(SEED_KEY, '1');
  }

  /* ── Helpers ── */
  function fmtTime(min) {
    return `${Math.floor(min/60)}:${String(min%60).padStart(2,'0')}`;
  }
  function minToTimeStr(min) {
    return `${String(Math.floor(min/60)).padStart(2,'0')}:${String(min%60).padStart(2,'0')}`;
  }
  function timeStrToMin(s) {
    const [h,m] = s.split(':').map(Number); return h*60+m;
  }
  function minToY(min)  { return (min - START_MIN) * PX_PER_MIN; }
  function yToMin(y)    { return y / PX_PER_MIN + START_MIN; }
  function snapMin(min) {
    const s = INTERVALS[intervalIdx];
    return Math.round(min / s) * s;
  }
  function clamp(v,lo,hi) { return Math.max(lo, Math.min(hi, v)); }

  /* ── Build time axis ── */
  function buildAxis() {
    const axis = document.getElementById('timeAxis');
    axis.style.height = TOTAL_H + 'px';
    axis.innerHTML = '';
    for (let t = START_MIN; t <= END_MIN; t += INTERVALS[intervalIdx]) {
      const el = document.createElement('div');
      el.className = 'time-label' + (t % 60 === 0 ? ' hour' : '');
      el.style.top = minToY(t) + 'px';
      el.textContent = fmtTime(t);
      axis.appendChild(el);
    }
  }

  /* ── Build day columns ── */
  function buildDayCols() {
    const wrapper = document.getElementById('daysWrapper');
    wrapper.innerHTML = '';
    const slotH = INTERVALS[intervalIdx] * PX_PER_MIN;
    const gridBg = `repeating-linear-gradient(to bottom,
      transparent 0, transparent ${slotH - 1}px,
      #e0e0e0 ${slotH - 1}px, #e0e0e0 ${slotH}px)`;

    for (let col = 0; col < 7; col++) {
      const div = document.createElement('div');
      div.className = 'day-col';
      div.dataset.col = col;
      div.style.height = TOTAL_H + 'px';
      div.style.backgroundImage = gridBg;

      div.addEventListener('click', e => {
        if (recentlyResized || e.target.closest('.event-block')) return;
        const rect = div.getBoundingClientRect();
        const y    = e.clientY - rect.top;
        const snap = INTERVALS[intervalIdx];
        const startMin = clamp(snapMin(yToMin(y)), START_MIN, END_MIN - snap);
        const endMin   = clamp(startMin + 60, START_MIN + snap, END_MIN);
        openModal(col, startMin, endMin);
      });

      wrapper.appendChild(div);
    }
  }

  /* ── Event elements ── */
  function createEventEl(ev) {
    const el = document.createElement('div');
    el.className = `event-block ${ev.category}`;
    el.dataset.id = ev.id;
    el.style.top    = minToY(ev.startMin) + 'px';
    el.style.height = Math.max(16, (ev.endMin - ev.startMin) * PX_PER_MIN) + 'px';

    const content = document.createElement('div');
    content.className = 'event-content';

    const nameEl = document.createElement('span');
    nameEl.className = 'event-name';
    nameEl.textContent = ev.name;

    const timeEl = document.createElement('span');
    timeEl.className = 'event-time-label';
    timeEl.textContent = `${fmtTime(ev.startMin)}〜${fmtTime(ev.endMin)}`;

    content.append(nameEl, timeEl);

    const delBtn = document.createElement('button');
    delBtn.className = 'event-del';
    delBtn.textContent = '×';
    delBtn.addEventListener('click', e => { e.stopPropagation(); deleteEvent(ev.id); });

    const handle = document.createElement('div');
    handle.className = 'resize-handle';
    handle.addEventListener('mousedown', e => startResize(e, ev.id));

    el.append(content, delBtn, handle);
    return el;
  }

  function renderCol(col) {
    const div = document.querySelector(`.day-col[data-col="${col}"]`);
    if (!div) return;
    div.querySelectorAll('.event-block').forEach(el => el.remove());
    events.filter(ev => ev.col === col)
          .forEach(ev => div.appendChild(createEventEl(ev)));
  }

  function renderAll() {
    for (let c = 0; c < 7; c++) renderCol(c);
  }

  function deleteEvent(id) {
    const ev = events.find(e => e.id === id);
    if (!ev) return;
    events = events.filter(e => e.id !== id);
    saveData();
    renderCol(ev.col);
  }

  /* ── Resize drag ── */
  let drag = null, recentlyResized = false;

  function startResize(e, id) {
    e.preventDefault();
    e.stopPropagation();
    const ev = events.find(e => e.id === id);
    if (!ev) return;
    drag = { id, startY: e.clientY, origEnd: ev.endMin, newEnd: null };
    document.body.classList.add('dragging');
    document.addEventListener('mousemove', onResizeMove);
    document.addEventListener('mouseup',   onResizeUp);
  }

  function onResizeMove(e) {
    if (!drag) return;
    const ev = events.find(e => e.id === drag.id);
    if (!ev) return;
    const snap   = INTERVALS[intervalIdx];
    const deltaMin = (e.clientY - drag.startY) / PX_PER_MIN;
    const newEnd = clamp(snapMin(drag.origEnd + deltaMin), ev.startMin + snap, END_MIN);
    drag.newEnd = newEnd;

    const el = document.querySelector(`.event-block[data-id="${drag.id}"]`);
    if (el) {
      el.style.height = Math.max(16, (newEnd - ev.startMin) * PX_PER_MIN) + 'px';
      const t = el.querySelector('.event-time-label');
      if (t) t.textContent = `${fmtTime(ev.startMin)}〜${fmtTime(newEnd)}`;
    }
  }

  function onResizeUp() {
    if (drag?.newEnd != null) {
      const ev = events.find(e => e.id === drag.id);
      if (ev) { ev.endMin = drag.newEnd; saveData(); renderCol(ev.col); }
    }
    drag = null;
    recentlyResized = true;
    setTimeout(() => recentlyResized = false, 50);
    document.body.classList.remove('dragging');
    document.removeEventListener('mousemove', onResizeMove);
    document.removeEventListener('mouseup',   onResizeUp);
  }

  /* ── Modal ── */
  let modalState = null;

  function openModal(col, defaultStart, defaultEnd) {
    modalState = { col };
    document.getElementById('modalTitle').textContent = `予定を追加（${DAY_NAMES[col]}曜日）`;
    document.getElementById('eventName').value     = '';
    document.getElementById('eventCategory').value = 'work';
    document.getElementById('eventStart').value    = minToTimeStr(defaultStart);
    document.getElementById('eventEnd').value      = minToTimeStr(defaultEnd);
    document.getElementById('modalOverlay').classList.add('active');
    document.getElementById('eventName').focus();
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    modalState = null;
  }

  document.getElementById('modalCancel').addEventListener('click', closeModal);

  document.getElementById('modalAdd').addEventListener('click', () => {
    const name  = document.getElementById('eventName').value.trim();
    const cat   = document.getElementById('eventCategory').value;
    const start = timeStrToMin(document.getElementById('eventStart').value);
    const end   = timeStrToMin(document.getElementById('eventEnd').value);
    if (!name) { document.getElementById('eventName').focus(); return; }
    if (end <= start) { alert('終了時間は開始時間より後にしてください'); return; }
    events.push({ id: nextId++, col: modalState.col, startMin: start, endMin: end, name, category: cat });
    saveData();
    renderCol(modalState.col);
    closeModal();
  });

  document.getElementById('eventName').addEventListener('keydown', e => {
    if (e.key === 'Enter')  document.getElementById('modalAdd').click();
    if (e.key === 'Escape') closeModal();
  });

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  /* ── Interval slider ── */
  const slider = document.getElementById('intervalSlider');
  const badge  = document.getElementById('intervalBadge');
  const ticks  = document.querySelectorAll('.slider-ticks span');

  function applyInterval(idx) {
    intervalIdx = idx;
    slider.value = idx;
    badge.textContent = INT_LABELS[idx];
    slider.style.setProperty('--fill', (idx / 3 * 100) + '%');
    ticks.forEach((s,i) => s.classList.toggle('active', i === idx));
    buildAxis();
    buildDayCols();
    renderAll();
    saveData();
  }

  slider.addEventListener('input', () => applyInterval(+slider.value));
  ticks.forEach(s => s.addEventListener('click', () => applyInterval(+s.dataset.idx)));

  /* ── Init ── */
  loadData();
  seedSample();
  applyInterval(intervalIdx);
</script>
</body>
</html>
